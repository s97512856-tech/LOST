<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0a"/>
      <stop offset="100%" style="stop-color:#1a2a1a"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#22c55e;stop-opacity:0.15"/>
      <stop offset="50%" style="stop-color:#22c55e;stop-opacity:0.05"/>
      <stop offset="100%" style="stop-color:#22c55e;stop-opacity:0.15"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#22c55e"/>
      <stop offset="50%" style="stop-color:#4ade80"/>
      <stop offset="100%" style="stop-color:#22c55e"/>
    </linearGradient>
    <linearGradient id="line" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:transparent"/>
      <stop offset="50%" style="stop-color:#22c55e;stop-opacity:0.4"/>
      <stop offset="100%" style="stop-color:transparent"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="0" stdDeviation="20" flood-color="#22c55e" flood-opacity="0.3"/>
    </filter>
    <filter id="glowFilter">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="800" height="600" fill="url(#bg)" rx="20"/>
  <rect x="30" y="30" width="740" height="540" fill="none" stroke="url(#glow)" stroke-width="2" rx="16"/>

  <circle cx="400" cy="200" r="100" fill="none" stroke="url(#glow)" stroke-width="0.5" filter="url(#shadow)"/>

  <rect x="100" y="480" width="600" height="1" fill="url(#line)"/>

  <text x="400" y="160" font-family="Segoe UI, Arial, sans-serif" font-size="120" font-weight="900" fill="url(#textGrad)" text-anchor="middle" filter="url(#glowFilter)">LOST</text>
  <text x="400" y="210" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="600" fill="#4ade80" text-anchor="middle" letter-spacing="8">PREMIUM</text>

  <rect x="300" y="230" width="200" height="2" fill="url(#line)"/>

  <text x="400" y="270" font-family="Segoe UI, Arial, sans-serif" font-size="14" fill="#888" text-anchor="middle">✦ DIGITAL PRODUCT PACKAGE ✦</text>

  <g transform="translate(400, 340)">
    <rect x="-120" y="-30" width="240" height="50" rx="25" fill="none" stroke="#22c55e" stroke-width="2"/>
    <text x="0" y="6" font-family="Segoe UI, Arial, sans-serif" font-size="16" font-weight="700" fill="#22c55e" text-anchor="middle" letter-spacing="3">UNLOCKED</text>
  </g>

  <g transform="translate(400, 420)">
    <circle cx="-80" cy="0" r="6" fill="#22c55e" opacity="0.6"/>
    <circle cx="-40" cy="0" r="4" fill="#22c55e" opacity="0.4"/>
    <circle cx="0" cy="0" r="6" fill="#22c55e" opacity="0.6"/>
    <circle cx="40" cy="0" r="4" fill="#22c55e" opacity="0.4"/>
    <circle cx="80" cy="0" r="6" fill="#22c55e" opacity="0.6"/>
  </g>

  <text x="400" y="530" font-family="Segoe UI, Arial, sans-serif" font-size="11" fill="#555" text-anchor="middle">© 2026 LOST DEVELOPMENT — All Rights Reserved</text>
</svg>
